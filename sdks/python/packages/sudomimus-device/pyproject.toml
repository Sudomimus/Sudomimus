[project]
name = "sudomimus-device"
version = "1.0.0"
description = "Sudomimus Device SDK — public-client device authorization with manual or automatic polling."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Sudomimus Contributors" },
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "sudomimus-session",
]

[project.urls]
Homepage = "https://sudomimus.com"
Repository = "https://github.com/sudomimus/sudomimus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sudomimus_device"]
