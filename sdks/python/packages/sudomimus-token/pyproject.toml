[project]
name = "sudomimus-token"
version = "0.0.1"
description = "Sudomimus Token SDK — parse and verify Sudomimus access and refresh JWTs."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Sudomimus Contributors" },
]
dependencies = [
    "cryptography>=42",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://sudomimus.com"
Repository = "https://github.com/sudomimus/sudomimus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sudomimus_token"]
