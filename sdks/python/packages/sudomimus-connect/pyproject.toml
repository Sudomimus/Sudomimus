[project]
name = "sudomimus-connect"
version = "1.0.0"
description = "Sudomimus Connect SDK — establish authentication inquiries, poll status, redeem tokens, and fetch application metadata."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Sudomimus Contributors" },
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "sudomimus-token",
]

[project.urls]
Homepage = "https://sudomimus.com"
Repository = "https://github.com/sudomimus/sudomimus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sudomimus_connect"]
