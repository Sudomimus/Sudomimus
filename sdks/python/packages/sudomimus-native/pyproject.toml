[project]
name = "sudomimus-native"
version = "0.0.1"
description = "Sudomimus Native SDK — native client entry point."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Sudomimus Contributors" },
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://sudomimus.com"
Repository = "https://github.com/sudomimus/sudomimus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sudomimus_native"]
