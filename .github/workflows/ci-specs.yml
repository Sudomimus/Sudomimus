name: Specs

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
      - ".github/workflows/ci-specs.yml"
  pull_request:
    paths:
      - "specs/**"
      - ".github/workflows/ci-specs.yml"

jobs:
  lint:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Lint specs
        run: npx --yes @redocly/cli@latest lint specs/connect.yaml specs/native.yaml
