name: TypeScript SDKs

on:
  push:
    branches: [main]
    paths:
      - "sdks/typescript/**"
      - "specs/**"
      - ".github/workflows/ci-typescript.yml"
  pull_request:
    paths:
      - "sdks/typescript/**"
      - "specs/**"
      - ".github/workflows/ci-typescript.yml"

defaults:
  run:
    working-directory: sdks/typescript

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Regenerate types from specs
        run: pnpm generate
      - name: Verify generated types are committed
        run: |
          if ! git diff --quiet -- packages; then
            echo "Generated types differ from committed output. Run 'pnpm generate' and commit the result." >&2
            git diff -- packages
            exit 1
          fi
      - run: pnpm lint
      - run: pnpm compile
      - run: pnpm test
