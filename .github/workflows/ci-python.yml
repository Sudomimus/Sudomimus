name: Python SDKs

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
      - "specs"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "sdks/python/**"
      - "specs"
      - ".github/workflows/ci-python.yml"

defaults:
  run:
    working-directory: sdks/python

jobs:
  build:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen
      - name: Regenerate models from specs
        run: uv run python tasks.py generate
      - name: Verify generated models are committed
        run: |
          if ! git diff --quiet -- packages; then
            echo "Generated models differ from committed output. Run 'uv run python tasks.py generate' and commit the result." >&2
            git diff -- packages
            exit 1
          fi
      - run: uv run ruff check
      - run: uv run mypy packages/sudomimus-token/src packages/sudomimus-native/src packages/sudomimus-connect/src
      - run: uv run pytest
